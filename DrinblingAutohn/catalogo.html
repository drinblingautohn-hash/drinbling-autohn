<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — DrinblingAutohn</title>
    <link rel="icon" type="image/png" href="LOGO2.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --blue: #0056b3;
            --blue-light: #00a8ff;
            --dark: #1a1a2e;
            --nav-bg: #252440;
            --white: #ffffff;
            --green-wa: #25d366;
            --bg: #f7f9fc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--dark); padding-top: 70px; }

        /* ── NAVBAR ── */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--nav-bg);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 3000;
            border-bottom: 2px solid var(--blue);
        }
        .logo-nav { width: 75px; }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            text-decoration: none; color: #ccc;
            font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px;
            transition: color .2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--white); }

        /* ── PAGE HEADER ── */
        .page-header {
            background: linear-gradient(135deg, var(--nav-bg) 0%, #0056b3 100%);
            color: white; text-align: center;
            padding: 50px 20px 40px;
        }
        .page-header h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: 2px; }
        .page-header p { opacity: .8; margin-top: 8px; font-size: 1rem; }

        /* ── GRID ── */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }

        /* ── CAR CARD ── */
        .car-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,.08);
            transition: transform .25s, box-shadow .25s;
        }
        .car-card:hover { transform: translateY(-6px); box-shadow: 0 10px 30px rgba(0,0,0,.13); }

        .car-card-img {
            width: 100%; height: 210px;
            object-fit: cover;
            background: #ddd;
        }
        .car-card-img-placeholder {
            width: 100%; height: 210px;
            background: linear-gradient(135deg, #e0e7ef, #c8d5e8);
            display: flex; align-items: center; justify-content: center;
            color: #999; font-size: 3rem;
        }

        .car-card-body { padding: 20px; }
        .car-card-body h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
        .car-price {
            color: var(--blue); font-weight: 700; font-size: 1.25rem;
            margin-bottom: 8px;
        }
        .car-info-preview {
            color: #666; font-size: .88rem; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 16px;
        }
        .btn-detalle {
            display: block; width: 100%;
            background: var(--blue); color: white;
            padding: 11px; border: none; border-radius: 8px;
            font-weight: 600; font-size: .95rem;
            cursor: pointer; transition: background .2s;
        }
        .btn-detalle:hover { background: #004494; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center; padding: 80px 20px;
            grid-column: 1 / -1;
        }
        .empty-state i { font-size: 4rem; color: #ccc; margin-bottom: 20px; }
        .empty-state p { color: #888; font-size: 1.1rem; }

        /* ── LOADING ── */
        .loading {
            text-align: center; padding: 60px;
            grid-column: 1 / -1; color: #888;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MODAL ── */
        .modal-overlay {
            display: none; position: fixed;
            inset: 0; background: rgba(0,0,0,.8);
            z-index: 5000; overflow-y: auto;
            padding: 30px 16px;
        }
        .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
        .modal-box {
            background: var(--white);
            width: 100%; max-width: 520px;
            border-radius: 20px; overflow: hidden;
            animation: slideUp .3s ease;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-img {
            width: 100%; height: 260px;
            object-fit: cover;
        }
        .modal-img-placeholder {
            width: 100%; height: 260px;
            background: linear-gradient(135deg, #e0e7ef, #c8d5e8);
            display: flex; align-items: center; justify-content: center;
            color: #bbb; font-size: 4rem;
        }
        .modal-body { padding: 28px; }
        .modal-body h2 { font-size: 1.5rem; margin-bottom: 4px; }
        .modal-price { color: var(--blue); font-size: 1.5rem; font-weight: 700; margin-bottom: 14px; }
        .modal-info { color: #444; line-height: 1.7; font-size: .97rem; margin-bottom: 24px; }

        .btn-wa {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--green-wa); color: white;
            padding: 14px; border-radius: 10px;
            text-decoration: none; font-weight: 700; font-size: 1.05rem;
            margin-bottom: 12px; transition: background .2s;
        }
        .btn-wa:hover { background: #1fb855; }
        .btn-close {
            display: block; width: 100%; padding: 11px;
            background: #f0f0f0; color: #555;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: .95rem;
        }
        .btn-close:hover { background: #e0e0e0; }

        /* ── WA FLOAT ── */
        .wa-float {
            position: fixed; bottom: 28px; right: 28px;
            background: var(--green-wa); color: white;
            padding: 14px 22px; border-radius: 50px;
            text-decoration: none; font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,.25);
            z-index: 1000; display: flex; align-items: center; gap: 8px;
            transition: transform .2s;
        }
        .wa-float:hover { transform: scale(1.05); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; }
            .nav-links a { font-size: 11px; }
            .nav-links { gap: 14px; }
            .page-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="LOGO2.png" class="logo-nav" alt="DrinblingAutohn">
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="catalogo.html" class="active">Catálogo</a>
            <a href="index.html#servicios">Servicios</a>
            <a href="index.html#contacto">Contacto</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>🚗 Catálogo de Vehículos</h1>
        <p>Encuentra tu próximo auto — importado directo desde USA y Corea</p>
    </div>

    <div class="container">
        <div class="car-grid" id="carGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando vehículos...</p>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box" id="modalBox"></div>
    </div>

    <a href="#" id="waFloat" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i> ¡Escríbenos!
    </a>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKxhqaplQsN8oJSwSqQk6wFYjxKDNEJVY",
            authDomain: "drinblingautohn-dd2b7.firebaseapp.com",
            projectId: "drinblingautohn-dd2b7",
            storageBucket: "drinblingautohn-dd2b7.firebasestorage.app",
            messagingSenderId: "509721955432",
            appId: "1:509721955432:web:e7874bc72973596b59bfdd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let waNumber = "50499979011";
        let cars = [];

        // ── Cargar config ──
        async function loadConfig() {
            try {
                const snap = await getDocs(collection(db, "config"));
                if (!snap.empty) {
                    const cfg = snap.docs[0].data();
                    waNumber = cfg.whatsapp || waNumber;
                    const text = cfg.whatsappText || waNumber;
                    document.getElementById('waFloat').href =
                        `https://wa.me/${waNumber}?text=Hola, me interesa conocer sus vehículos.`;
                }
            } catch(e) { console.warn("Config no disponible"); }
        }

        // ── Cargar autos ──
        async function loadCars() {
            try {
                const snap = await getDocs(collection(db, "autos"));
                cars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCars();
            } catch(e) {
                document.getElementById('carGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error al cargar el catálogo. Intenta más tarde.</p>
                    </div>`;
            }
        }

        // ── Renderizar ──
        function renderCars() {
            const grid = document.getElementById('carGrid');
            if (cars.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-car"></i>
                        <p>Próximamente más vehículos disponibles.</p>
                    </div>`;
                return;
            }
            grid.innerHTML = cars.map(car => `
                <div class="car-card">
                    ${car.img
                        ? `<img src="${car.img}" class="car-card-img" alt="${car.modelo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                        : ''}
                    <div class="car-card-img-placeholder" style="${car.img ? 'display:none' : ''}">
                        <i class="fas fa-car"></i>
                    </div>
                    <div class="car-card-body">
                        <h3>${car.modelo || 'Sin nombre'}</h3>
                        <div class="car-price">${car.precio || 'Consultar precio'}</div>
                        <p class="car-info-preview">${car.info || ''}</p>
                        <button class="btn-detalle" onclick="showDetails('${car.id}')">
                            <i class="fas fa-eye"></i> Ver detalles
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ── Modal ──
        window.showDetails = function(id) {
            const car = cars.find(c => c.id === id);
            if (!car) return;

            const waMsg = encodeURIComponent(`Hola, estoy interesado en el vehículo: ${car.modelo}`);
            document.getElementById('modalBox').innerHTML = `
                ${car.img
                    ? `<img src="${car.img}" class="modal-img" alt="${car.modelo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                    : ''}
                <div class="modal-img-placeholder" style="${car.img ? 'display:none' : ''}">
                    <i class="fas fa-car"></i>
                </div>
                <div class="modal-body">
                    <h2>${car.modelo || 'Sin nombre'}</h2>
                    <div class="modal-price">${car.precio || 'Consultar precio'}</div>
                    <p class="modal-info">${car.info || 'Sin descripción disponible.'}</p>
                    <a href="https://wa.me/${waNumber}?text=${waMsg}" class="btn-wa" target="_blank">
                        <i class="fab fa-whatsapp"></i> Consultar por WhatsApp
                    </a>
                    <button class="btn-close" onclick="closeModal()">Cerrar</button>
                </div>
            `;
            document.getElementById('modal').classList.add('open');
        };

        window.closeModal = function() {
            document.getElementById('modal').classList.remove('open');
        };

        // Cerrar modal al hacer click afuera
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ── Init ──
        await loadConfig();
        await loadCars();
    </script>
</body>
</html>
