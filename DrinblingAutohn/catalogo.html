<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Catálogo — DrinblingAutohn</title>
    <link rel="icon" type="image/png" href="LOGO2.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --blue: #0056b3; --blue-light: #00a8ff; --dark: #1a1a2e;
            --nav-bg: #252440; --white: #fff; --green-wa: #25d366; --bg: #f7f9fc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--dark); padding-top: 70px; }

        /* NAVBAR */
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: var(--nav-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 3000; border-bottom: 2px solid var(--blue); }
        .logo-nav { width: 75px; }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a { text-decoration: none; color: #ccc; font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; transition: color .2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--white); }

        /* PAGE HEADER */
        .page-header { background: linear-gradient(135deg, var(--nav-bg) 0%, #0056b3 100%); color: white; text-align: center; padding: 50px 20px 40px; }
        .page-header h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: 2px; }
        .page-header p { opacity: .8; margin-top: 8px; font-size: 1rem; }

        /* GRID */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }

        /* CAR CARD */
        .car-card { background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.08); transition: transform .25s, box-shadow .25s; }
        .car-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,.13); }

        /* GALLERY MINI */
        .card-gallery { position: relative; height: 210px; background: #e0e7ef; overflow: hidden; }
        .card-gallery img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity .4s; }
        .card-gallery img.active { opacity: 1; }
        .card-gallery .placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 3rem; }
        .gallery-count { position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,.55); color: white; font-size: .75rem; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
        .gallery-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.45); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: .85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; z-index: 2; }
        .gallery-arrow:hover { background: rgba(0,0,0,.7); }
        .arrow-left { left: 8px; }
        .arrow-right { right: 8px; }

        /* CARD BODY */
        .car-card-body { padding: 18px 20px; }
        .car-card-body h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
        .car-price { color: var(--blue); font-weight: 800; font-size: 1.3rem; margin-bottom: 12px; }
        .car-specs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        .spec-badge { display: flex; align-items: center; gap: 5px; background: #f0f4f8; border-radius: 6px; padding: 5px 10px; font-size: .78rem; color: #555; font-weight: 600; }
        .spec-badge i { color: var(--blue); font-size: .8rem; }
        .car-updated { font-size: .75rem; color: #aaa; margin-bottom: 14px; }
        .btn-detalle { display: block; width: 100%; background: var(--blue); color: white; padding: 11px; border: none; border-radius: 8px; font-weight: 600; font-size: .95rem; cursor: pointer; transition: background .2s; font-family: 'Poppins', sans-serif; }
        .btn-detalle:hover { background: #004494; }

        /* EMPTY / LOADING */
        .empty-state { text-align: center; padding: 80px 20px; grid-column: 1/-1; }
        .empty-state i { font-size: 4rem; color: #ccc; margin-bottom: 20px; }
        .empty-state p { color: #888; font-size: 1.1rem; }
        .loading { text-align: center; padding: 60px; grid-column: 1/-1; color: #888; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 5000; overflow-y: auto; padding: 16px; }
        .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
        .modal-box { background: var(--white); width: 100%; max-width: 620px; border-radius: 20px; overflow: hidden; animation: slideUp .3s ease; margin-top: 10px; }
        @keyframes slideUp { from { transform: translateY(40px); opacity:0; } to { transform: translateY(0); opacity:1; } }

        /* MODAL GALLERY */
        .modal-gallery { position: relative; height: 300px; background: #111; overflow: hidden; }
        .modal-gallery img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity .4s; }
        .modal-gallery img.active { opacity: 1; }
        .modal-gallery .placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #444; font-size: 4rem; }
        .modal-gallery .gallery-arrow { width: 38px; height: 38px; font-size: 1rem; }
        .modal-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .modal-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.4); cursor: pointer; transition: background .2s; }
        .modal-dot.active { background: white; }

        /* MODAL BODY */
        .modal-body { padding: 24px; }
        .modal-body h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
        .modal-price { color: var(--blue); font-size: 1.6rem; font-weight: 800; margin-bottom: 16px; }
        .modal-specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
        .modal-spec { background: #f7f9fc; border-radius: 10px; padding: 12px 14px; }
        .modal-spec .spec-label { font-size: .75rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
        .modal-spec .spec-val { font-size: .95rem; font-weight: 700; color: var(--dark); margin-top: 3px; }
        .modal-desc { background: #f7f9fc; border-radius: 10px; padding: 14px; font-size: .92rem; color: #444; line-height: 1.7; margin-bottom: 18px; }
        .modal-updated { font-size: .78rem; color: #bbb; margin-bottom: 18px; }
        .btn-wa { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--green-wa); color: white; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 1.05rem; margin-bottom: 12px; transition: background .2s; }
        .btn-wa:hover { background: #1fb855; }
        .btn-close { display: block; width: 100%; padding: 11px; background: #f0f0f0; color: #555; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .95rem; font-family: 'Poppins', sans-serif; }
        .btn-close:hover { background: #e0e0e0; }

        footer { background: var(--nav-bg); color: #aaa; text-align: center; padding: 24px; font-size: .85rem; }

        @media (max-width: 768px) {
            .navbar { padding: 0 16px; }
            .nav-links a { font-size: 11px; }
            .nav-links { gap: 14px; }
            .page-header h1 { font-size: 1.8rem; }
            .modal-specs-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="LOGO2.png" class="logo-nav" alt="DrinblingAutohn">
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="catalogo.html" class="active">Catálogo</a>
            <a href="index.html#servicios">Servicios</a>
            <a href="contacto.html">Contacto</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>🚗 Catálogo de Vehículos</h1>
        <p>Encuentra tu próximo auto — importado directo desde USA y Corea</p>
    </div>

    <div class="container">
        <div class="car-grid" id="carGrid">
            <div class="loading"><div class="spinner"></div><p>Cargando vehículos...</p></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box" id="modalBox"></div>
    </div>

    <footer>
        <p>© 2025 DrinblingAutohn · Todos los derechos reservados</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKxhqaplQsN8oJSwSqQk6wFYjxKDNEJVY",
            authDomain: "drinblingautohn-dd2b7.firebaseapp.com",
            projectId: "drinblingautohn-dd2b7",
            storageBucket: "drinblingautohn-dd2b7.firebasestorage.app",
            messagingSenderId: "509721955432",
            appId: "1:509721955432:web:e7874bc72973596b59bfdd"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);
        let waNumber = "50499979011";
        let cars = [];

        async function loadConfig() {
            try {
                const snap = await getDocs(collection(db, "config"));
                if (!snap.empty) waNumber = snap.docs[0].data().whatsapp || waNumber;
            } catch(e) {}
        }

        async function loadCars() {
            try {
                const snap = await getDocs(collection(db, "autos"));
                cars = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCars();
            } catch(e) {
                document.getElementById('carGrid').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error al cargar el catálogo.</p></div>`;
            }
        }

        function getPhotos(car) {
            // Soporta fotos[] array o img string legacy
            if (car.fotos && car.fotos.length > 0) return car.fotos;
            if (car.img) return [car.img];
            return [];
        }

        function formatDate(ts) {
            if (!ts) return null;
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('es-HN', { day: '2-digit', month: 'long', year: 'numeric' });
        }

        function buildMiniGallery(photos, cardId) {
            if (photos.length === 0) return `<div class="card-gallery"><div class="placeholder"><i class="fas fa-car"></i></div></div>`;
            const imgs = photos.map((src, i) => `<img src="${src}" class="${i===0?'active':''}" alt="foto ${i+1}" loading="lazy">`).join('');
            const arrows = photos.length > 1 ? `
                <button class="gallery-arrow arrow-left" onclick="slideCard(event,'${cardId}',-1)"><i class="fas fa-chevron-left"></i></button>
                <button class="gallery-arrow arrow-right" onclick="slideCard(event,'${cardId}',1)"><i class="fas fa-chevron-right"></i></button>
                <div class="gallery-count"><i class="fas fa-camera"></i> ${photos.length}</div>` : '';
            return `<div class="card-gallery" id="gallery-${cardId}">${imgs}${arrows}</div>`;
        }

        function renderCars() {
            const grid = document.getElementById('carGrid');
            if (cars.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="fas fa-car"></i><p>Próximamente más vehículos disponibles.</p></div>`;
                return;
            }
            grid.innerHTML = cars.map(car => {
                const photos = getPhotos(car);
                const specs = [
                    car.año   ? `<div class="spec-badge"><i class="fas fa-calendar-alt"></i>${car.año}</div>` : '',
                    car.km    ? `<div class="spec-badge"><i class="fas fa-tachometer-alt"></i>${car.km}</div>` : '',
                    car.trans ? `<div class="spec-badge"><i class="fas fa-cog"></i>${car.trans}</div>` : '',
                    car.motor ? `<div class="spec-badge"><i class="fas fa-gas-pump"></i>${car.motor}</div>` : '',
                ].filter(Boolean).join('');
                const updated = formatDate(car.updatedAt || car.createdAt);
                return `
                <div class="car-card">
                    ${buildMiniGallery(photos, car.id)}
                    <div class="car-card-body">
                        <h3>${car.modelo || 'Sin nombre'}</h3>
                        <div class="car-price">${car.precio || 'Consultar precio'}</div>
                        ${specs ? `<div class="car-specs">${specs}</div>` : ''}
                        ${updated ? `<div class="car-updated"><i class="fas fa-clock"></i> Actualizado: ${updated}</div>` : ''}
                        <button class="btn-detalle" onclick="showDetails('${car.id}')"><i class="fas fa-eye"></i> Ver detalles</button>
                    </div>
                </div>`;
            }).join('');
        }

        // Mini gallery slide
        window.slideCard = function(e, id, dir) {
            e.stopPropagation();
            const gallery = document.getElementById('gallery-' + id);
            const imgs = gallery.querySelectorAll('img');
            if (imgs.length < 2) return;
            let current = [...imgs].findIndex(i => i.classList.contains('active'));
            imgs[current].classList.remove('active');
            current = (current + dir + imgs.length) % imgs.length;
            imgs[current].classList.add('active');
        };

        // Modal gallery
        let modalPhotos = [], modalIdx = 0;

        window.showDetails = function(id) {
            const car = cars.find(c => c.id === id);
            if (!car) return;
            modalPhotos = getPhotos(car);
            modalIdx = 0;

            const waMsg = encodeURIComponent(`Hola, estoy interesado en el vehículo: ${car.modelo}`);
            const updated = formatDate(car.updatedAt || car.createdAt);

            const specsHTML = [
                car.año    ? ['Año', car.año, 'fa-calendar-alt'] : null,
                car.km     ? ['Kilometraje', car.km, 'fa-tachometer-alt'] : null,
                car.motor  ? ['Motor', car.motor, 'fa-gas-pump'] : null,
                car.trans  ? ['Transmisión', car.trans, 'fa-cog'] : null,
                car.color  ? ['Color', car.color, 'fa-palette'] : null,
                car.origen ? ['Origen', car.origen, 'fa-globe'] : null,
            ].filter(Boolean).map(([label, val]) => `
                <div class="modal-spec">
                    <div class="spec-label">${label}</div>
                    <div class="spec-val">${val}</div>
                </div>`).join('');

            document.getElementById('modalBox').innerHTML = `
                <div class="modal-gallery" id="modalGallery">
                    ${modalPhotos.length > 0
                        ? modalPhotos.map((src, i) => `<img src="${src}" class="${i===0?'active':''}" alt="foto ${i+1}">`).join('')
                        : '<div class="placeholder"><i class="fas fa-car"></i></div>'}
                    ${modalPhotos.length > 1 ? `
                        <button class="gallery-arrow arrow-left" onclick="slideModal(-1)"><i class="fas fa-chevron-left"></i></button>
                        <button class="gallery-arrow arrow-right" onclick="slideModal(1)"><i class="fas fa-chevron-right"></i></button>
                        <div class="modal-dots" id="modalDots">
                            ${modalPhotos.map((_,i) => `<div class="modal-dot ${i===0?'active':''}" onclick="goModal(${i})"></div>`).join('')}
                        </div>` : ''}
                </div>
                <div class="modal-body">
                    <h2>${car.modelo || 'Sin nombre'}</h2>
                    <div class="modal-price">${car.precio || 'Consultar precio'}</div>
                    ${specsHTML ? `<div class="modal-specs-grid">${specsHTML}</div>` : ''}
                    ${car.info ? `<div class="modal-desc">${car.info}</div>` : ''}
                    ${updated ? `<div class="modal-updated"><i class="fas fa-clock"></i> Última actualización: ${updated}</div>` : ''}
                    <a href="https://wa.me/${waNumber}?text=${waMsg}" class="btn-wa" target="_blank">
                        <i class="fab fa-whatsapp"></i> Consultar por WhatsApp
                    </a>
                    <button class="btn-close" onclick="closeModal()">Cerrar</button>
                </div>`;

            document.getElementById('modal').classList.add('open');
        };

        window.slideModal = function(dir) {
            const imgs = document.getElementById('modalGallery').querySelectorAll('img');
            const dots = document.querySelectorAll('.modal-dot');
            if (imgs.length < 2) return;
            imgs[modalIdx].classList.remove('active');
            if (dots[modalIdx]) dots[modalIdx].classList.remove('active');
            modalIdx = (modalIdx + dir + imgs.length) % imgs.length;
            imgs[modalIdx].classList.add('active');
            if (dots[modalIdx]) dots[modalIdx].classList.add('active');
        };

        window.goModal = function(idx) {
            const imgs = document.getElementById('modalGallery').querySelectorAll('img');
            const dots = document.querySelectorAll('.modal-dot');
            imgs[modalIdx].classList.remove('active');
            if (dots[modalIdx]) dots[modalIdx].classList.remove('active');
            modalIdx = idx;
            imgs[modalIdx].classList.add('active');
            if (dots[modalIdx]) dots[modalIdx].classList.add('active');
        };

        window.closeModal = function() { document.getElementById('modal').classList.remove('open'); };
        document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

        await loadConfig();
        await loadCars();
    </script>
</body>
</html>
