<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — DrinblingAutohn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #1e1e2f;
            --card: #252440;
            --blue: #0056b3;
            --blue-light: #00a8ff;
            --green: #25d366;
            --red: #ff4757;
            --yellow: #ffc107;
            --white: #fff;
            --muted: #888;
            --border: #3d3b66;
            --input-bg: #1a1a2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

        /* ─────────────────────────────
           LOGIN SCREEN
        ───────────────────────────── */
        #loginScreen {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: var(--card);
            padding: 48px 40px;
            border-radius: 18px;
            width: 100%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
            text-align: center;
        }
        .login-box h1 { font-size: 1.6rem; color: var(--blue-light); margin-bottom: 6px; }
        .login-box p { color: var(--muted); font-size: .9rem; margin-bottom: 30px; }
        .login-box input {
            width: 100%; padding: 13px 16px;
            background: var(--input-bg); color: var(--white);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 1rem; font-family: 'Poppins', sans-serif;
            margin-bottom: 14px;
        }
        .login-box input:focus { outline: none; border-color: var(--blue-light); }
        .btn { 
            width: 100%; padding: 13px;
            border: none; border-radius: 8px;
            font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: opacity .2s;
            font-family: 'Poppins', sans-serif;
        }
        .btn:hover { opacity: .88; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-yellow { background: var(--yellow); color: #222; }
        .login-error { color: var(--red); font-size: .88rem; margin-bottom: 12px; display: none; }

        /* ─────────────────────────────
           ADMIN PANEL
        ───────────────────────────── */
        #adminPanel { display: none; }

        .top-bar {
            background: var(--card);
            padding: 16px 30px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid var(--blue);
            position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { font-size: 1.2rem; color: var(--blue-light); }
        .top-bar-right { display: flex; gap: 10px; }
        .btn-sm {
            padding: 8px 16px; border: none; border-radius: 6px;
            font-size: .85rem; font-weight: 600; cursor: pointer;
            transition: opacity .2s; font-family: 'Poppins', sans-serif;
        }
        .btn-sm:hover { opacity: .85; }

        .admin-body { max-width: 900px; margin: 0 auto; padding: 30px 20px; }

        /* ── SECTION ── */
        .section {
            background: var(--card);
            border-radius: 14px; padding: 28px;
            margin-bottom: 28px;
        }
        .section h2 {
            font-size: 1.1rem; color: var(--blue-light);
            margin-bottom: 20px;
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }

        /* ── FORM ── */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: .85rem;
            color: #bbb; margin-bottom: 6px; font-weight: 600;
        }
        .form-group input,
        .form-group textarea {
            width: 100%; padding: 11px 14px;
            background: var(--input-bg); color: var(--white);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: .95rem; font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus,
        .form-group textarea:focus { outline: none; border-color: var(--blue-light); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        /* ── CAR LIST ── */
        .car-item {
            background: var(--input-bg);
            border-radius: 10px; padding: 16px;
            margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px;
            border-left: 4px solid var(--blue);
        }
        .car-item-thumb {
            width: 80px; height: 60px;
            object-fit: cover; border-radius: 6px;
            background: #2a2a45; flex-shrink: 0;
        }
        .car-item-thumb-placeholder {
            width: 80px; height: 60px;
            background: #2a2a45; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 1.6rem; flex-shrink: 0;
        }
        .car-item-info { flex: 1; min-width: 0; }
        .car-item-info strong { display: block; font-size: .95rem; margin-bottom: 2px; }
        .car-item-info span { font-size: .8rem; color: var(--muted); }
        .car-item-price { color: var(--blue-light); font-weight: 700; font-size: .95rem; margin-top: 2px; }
        .car-item-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* ── MODAL EDIT ── */
        .edit-overlay {
            display: none; position: fixed;
            inset: 0; background: rgba(0,0,0,.85);
            z-index: 5000; overflow-y: auto;
            padding: 30px 16px;
            align-items: flex-start; justify-content: center;
        }
        .edit-overlay.open { display: flex; }
        .edit-box {
            background: var(--card);
            width: 100%; max-width: 540px;
            border-radius: 16px; padding: 32px;
            animation: slideUp .3s ease;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
        .edit-box h2 { color: var(--blue-light); margin-bottom: 22px; font-size: 1.2rem; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 12px 24px;
            border-radius: 50px; font-size: .9rem; font-weight: 600;
            z-index: 9999; opacity: 0; transition: opacity .3s;
            pointer-events: none;
        }
        #toast.show { opacity: 1; }
        #toast.success { background: var(--green); }
        #toast.error { background: var(--red); }

        /* ── SPINNER ── */
        .spinner-inline {
            display: inline-block; width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,.3);
            border-top-color: white; border-radius: 50%;
            animation: spin .7s linear infinite; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-list { text-align: center; padding: 40px; color: var(--muted); }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .car-item { flex-wrap: wrap; }
            .login-box { padding: 32px 24px; }
            .top-bar { padding: 14px 16px; }
        }
    </style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="loginScreen">
    <div class="login-box">
        <h1><i class="fas fa-shield-alt"></i> Panel Admin</h1>
        <p>DrinblingAutohn · Acceso restringido</p>
        <p class="login-error" id="loginError"><i class="fas fa-exclamation-triangle"></i> Contraseña incorrecta.</p>
        <input type="password" id="loginInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn btn-blue" onclick="doLogin()">
            <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
    </div>
</div>

<!-- ═══════════ PANEL ADMIN ═══════════ -->
<div id="adminPanel">

    <div class="top-bar">
        <h1><i class="fas fa-cog"></i> Panel de Administración</h1>
        <div class="top-bar-right">
            <a href="catalogo.html" class="btn-sm" style="background:#3d3b66;color:white;text-decoration:none;padding:8px 16px;border-radius:6px;font-size:.85rem;font-weight:600;">
                <i class="fas fa-eye"></i> Ver Catálogo
            </a>
            <button class="btn-sm" style="background:#3d3b66;color:white;" onclick="doLogout()">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </div>

    <div class="admin-body">

        <!-- ── 1. CONFIGURACIÓN ── -->
        <div class="section">
            <h2><i class="fas fa-phone"></i> Contacto & Configuración</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>Número WhatsApp (con código, ej: 50499979011)</label>
                    <input type="text" id="cfgWhatsapp" placeholder="504XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label>Texto visible (ej: (504) 9997-9011)</label>
                    <input type="text" id="cfgWhatsappText" placeholder="(504) XXXX-XXXX">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Contraseña actual del panel</label>
                    <input type="password" id="cfgPassOld" placeholder="Contraseña actual">
                </div>
                <div class="form-group">
                    <label>Nueva contraseña (dejar vacío = no cambiar)</label>
                    <input type="password" id="cfgPassNew" placeholder="Nueva contraseña">
                </div>
            </div>

            <button class="btn btn-green" onclick="saveConfig()" style="max-width:260px;">
                <i class="fas fa-save"></i> Guardar Configuración
            </button>
        </div>

        <!-- ── 2. AGREGAR AUTO ── -->
        <div class="section">
            <h2><i class="fas fa-plus-circle"></i> Agregar Vehículo</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>Modelo del vehículo *</label>
                    <input type="text" id="addModelo" placeholder="Ej: Toyota Corolla 2022">
                </div>
                <div class="form-group">
                    <label>Precio</label>
                    <input type="text" id="addPrecio" placeholder="Ej: $12,500">
                </div>
            </div>
            <div class="form-group">
                <label>Descripción / Información *</label>
                <textarea id="addInfo" placeholder="Ej: Versión de lujo, asientos de cuero, 4x4..."></textarea>
            </div>
            <div class="form-group">
                <label>URL de la imagen (desde Cloudinary u otro servicio)</label>
                <input type="text" id="addImg" placeholder="https://res.cloudinary.com/...">
            </div>
            <button class="btn btn-blue" onclick="addCar()" style="max-width:240px;" id="btnAdd">
                <i class="fas fa-car"></i> Agregar al Catálogo
            </button>
        </div>

        <!-- ── 3. INVENTARIO ── -->
        <div class="section">
            <h2><i class="fas fa-list"></i> Inventario Actual</h2>
            <div id="carList">
                <div class="empty-list"><span class="spinner-inline"></span> Cargando...</div>
            </div>
        </div>

    </div>
</div>

<!-- ── MODAL EDITAR ── -->
<div class="edit-overlay" id="editOverlay">
    <div class="edit-box">
        <h2><i class="fas fa-edit"></i> Editar Vehículo</h2>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group">
                <label>Modelo *</label>
                <input type="text" id="editModelo">
            </div>
            <div class="form-group">
                <label>Precio</label>
                <input type="text" id="editPrecio">
            </div>
        </div>
        <div class="form-group">
            <label>Descripción *</label>
            <textarea id="editInfo"></textarea>
        </div>
        <div class="form-group">
            <label>URL de imagen</label>
            <input type="text" id="editImg">
        </div>
        <div style="display:flex;gap:10px;margin-top:6px;">
            <button class="btn btn-green" onclick="saveEdit()" style="flex:1;">
                <i class="fas fa-save"></i> Guardar cambios
            </button>
            <button class="btn" style="flex:1;background:#3d3b66;color:white;" onclick="closeEdit()">
                Cancelar
            </button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
        getFirestore, collection, getDocs, addDoc,
        updateDoc, deleteDoc, doc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKxhqaplQsN8oJSwSqQk6wFYjxKDNEJVY",
        authDomain: "drinblingautohn-dd2b7.firebaseapp.com",
        projectId: "drinblingautohn-dd2b7",
        storageBucket: "drinblingautohn-dd2b7.firebasestorage.app",
        messagingSenderId: "509721955432",
        appId: "1:509721955432:web:e7874bc72973596b59bfdd"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    let cars      = [];
    let configDocId = null;
    let currentPassword = null;

    // ─────────── TOAST ───────────
    function toast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `show ${type}`;
        setTimeout(() => { t.className = ''; }, 3000);
    }

    // ─────────── LOGIN ───────────
    window.doLogin = async function() {
        const input = document.getElementById('loginInput').value;
        try {
            const snap = await getDocs(collection(db, "config"));
            if (!snap.empty) {
                const cfg = snap.docs[0].data();
                configDocId = snap.docs[0].id;
                currentPassword = cfg.password;
                if (input === currentPassword) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminPanel').style.display  = 'block';
                    loadAll();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            }
        } catch(e) {
            toast('Error al conectar con Firebase', 'error');
        }
    };

    window.doLogout = function() {
        document.getElementById('adminPanel').style.display  = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('loginInput').value = '';
        document.getElementById('loginError').style.display = 'none';
    };

    // ─────────── LOAD ALL ───────────
    async function loadAll() {
        await loadConfig();
        await loadCars();
    }

    async function loadConfig() {
        try {
            const snap = await getDocs(collection(db, "config"));
            if (!snap.empty) {
                const cfg = snap.docs[0].data();
                document.getElementById('cfgWhatsapp').value     = cfg.whatsapp     || '';
                document.getElementById('cfgWhatsappText').value = cfg.whatsappText || '';
            }
        } catch(e) { toast('No se pudo cargar la configuración', 'error'); }
    }

    async function loadCars() {
        try {
            const snap = await getDocs(collection(db, "autos"));
            cars = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderCarList();
        } catch(e) {
            document.getElementById('carList').innerHTML = '<p style="color:#ff4757;text-align:center;">Error al cargar autos.</p>';
        }
    }

    // ─────────── RENDER LIST ───────────
    function renderCarList() {
        const list = document.getElementById('carList');
        if (cars.length === 0) {
            list.innerHTML = '<div class="empty-list"><i class="fas fa-car" style="font-size:2rem;color:#444;display:block;margin-bottom:10px;"></i>No hay autos en el inventario.</div>';
            return;
        }
        list.innerHTML = cars.map(car => `
            <div class="car-item">
                ${car.img
                    ? `<img src="${car.img}" class="car-item-thumb" alt="${car.modelo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                    : ''}
                <div class="car-item-thumb-placeholder" style="${car.img ? 'display:none' : ''}">
                    <i class="fas fa-car"></i>
                </div>
                <div class="car-item-info">
                    <strong>${car.modelo || 'Sin nombre'}</strong>
                    <span>${(car.info || '').substring(0, 70)}${(car.info||'').length > 70 ? '...' : ''}</span>
                    <div class="car-item-price">${car.precio || 'Sin precio'}</div>
                </div>
                <div class="car-item-actions">
                    <button class="btn-sm" style="background:#ffc107;color:#222;" onclick="openEdit('${car.id}')">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn-sm" style="background:#ff4757;color:white;" onclick="deleteCar('${car.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    // ─────────── ADD CAR ───────────
    window.addCar = async function() {
        const modelo = document.getElementById('addModelo').value.trim();
        const precio = document.getElementById('addPrecio').value.trim();
        const info   = document.getElementById('addInfo').value.trim();
        const img    = document.getElementById('addImg').value.trim();

        if (!modelo || !info) {
            toast('El modelo y la descripción son obligatorios.', 'error');
            return;
        }

        const btn = document.getElementById('btnAdd');
        btn.innerHTML = '<span class="spinner-inline"></span> Agregando...';
        btn.disabled = true;

        try {
            const docRef = await addDoc(collection(db, "autos"), { modelo, precio, info, img });
            cars.push({ id: docRef.id, modelo, precio, info, img });
            renderCarList();
            document.getElementById('addModelo').value = '';
            document.getElementById('addPrecio').value = '';
            document.getElementById('addInfo').value   = '';
            document.getElementById('addImg').value    = '';
            toast('✅ Vehículo agregado al catálogo.');
        } catch(e) {
            toast('Error al agregar el vehículo.', 'error');
        }

        btn.innerHTML = '<i class="fas fa-car"></i> Agregar al Catálogo';
        btn.disabled = false;
    };

    // ─────────── DELETE CAR ───────────
    window.deleteCar = async function(id) {
        if (!confirm('¿Eliminar este vehículo del catálogo?')) return;
        try {
            await deleteDoc(doc(db, "autos", id));
            cars = cars.filter(c => c.id !== id);
            renderCarList();
            toast('🗑️ Vehículo eliminado.');
        } catch(e) {
            toast('Error al eliminar.', 'error');
        }
    };

    // ─────────── EDIT ───────────
    window.openEdit = function(id) {
        const car = cars.find(c => c.id === id);
        if (!car) return;
        document.getElementById('editId').value     = id;
        document.getElementById('editModelo').value = car.modelo || '';
        document.getElementById('editPrecio').value = car.precio || '';
        document.getElementById('editInfo').value   = car.info   || '';
        document.getElementById('editImg').value    = car.img    || '';
        document.getElementById('editOverlay').classList.add('open');
    };

    window.closeEdit = function() {
        document.getElementById('editOverlay').classList.remove('open');
    };

    window.saveEdit = async function() {
        const id     = document.getElementById('editId').value;
        const modelo = document.getElementById('editModelo').value.trim();
        const precio = document.getElementById('editPrecio').value.trim();
        const info   = document.getElementById('editInfo').value.trim();
        const img    = document.getElementById('editImg').value.trim();

        if (!modelo || !info) {
            toast('El modelo y descripción son obligatorios.', 'error');
            return;
        }

        try {
            await updateDoc(doc(db, "autos", id), { modelo, precio, info, img });
            const i = cars.findIndex(c => c.id === id);
            if (i > -1) cars[i] = { id, modelo, precio, info, img };
            renderCarList();
            closeEdit();
            toast('✅ Vehículo actualizado.');
        } catch(e) {
            toast('Error al guardar cambios.', 'error');
        }
    };

    // ─────────── SAVE CONFIG ───────────
    window.saveConfig = async function() {
        const waNum  = document.getElementById('cfgWhatsapp').value.trim();
        const waText = document.getElementById('cfgWhatsappText').value.trim();
        const passOld = document.getElementById('cfgPassOld').value;
        const passNew = document.getElementById('cfgPassNew').value;

        if (!waNum || !waText) {
            toast('El número y texto de WhatsApp son obligatorios.', 'error');
            return;
        }

        let newPass = currentPassword;

        // Si quiere cambiar contraseña
        if (passNew) {
            if (passOld !== currentPassword) {
                toast('La contraseña actual no es correcta.', 'error');
                return;
            }
            newPass = passNew;
        }

        try {
            if (!configDocId) {
                const snap = await getDocs(collection(db, "config"));
                configDocId = snap.docs[0]?.id;
            }
            await updateDoc(doc(db, "config", configDocId), {
                whatsapp: waNum,
                whatsappText: waText,
                password: newPass
            });
            currentPassword = newPass;
            document.getElementById('cfgPassOld').value = '';
            document.getElementById('cfgPassNew').value = '';
            toast('✅ Configuración guardada.');
        } catch(e) {
            toast('Error al guardar configuración.', 'error');
        }
    };

    // Cerrar modal al click fuera
    document.getElementById('editOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeEdit();
    });
</script>
</body>
</html>
